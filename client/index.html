<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Legora Replica</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA redirect: restore path from query parameter set by 404.html
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= query param from 404.html redirect
        var search = location.search;
        if (search.slice(1, 3) === "p=") {
          var decoded = search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); });
          var path = decoded[0].slice(2);
          var query = decoded[1] ? "?" + decoded[1].slice(2) : "";
          var base = location.pathname.endsWith("/")
            ? location.pathname.slice(0, -1)
            : location.pathname;
          history.replaceState(null, null, base + (path ? "/" + path : "/") + query + location.hash);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
