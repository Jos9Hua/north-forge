<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>North Forge</title>
    <script>
      // GitHub Pages SPA redirect:
      // Encode the current path as a query parameter and redirect to index.html,
      // which will decode it and restore the URL via the History API.
      var segmentCount = 1; // number of path segments in the repo name (e.g. /north-forge = 1)
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
